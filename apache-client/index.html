<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SecureApp Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>SecureApp</h1>
    <p class="subtitle">Async client served by Apache over TLS</p>

    <section class="panel">
      <label for="apiBase">Spring API Base URL (HTTPS)</label>
      <input id="apiBase" type="text" value="https://localhost:5000" />
      <small>Example: https://api.your-domain.com</small>
    </section>

    <section class="panel">
      <h2>Register</h2>
      <form id="registerForm">
        <input id="registerUser" type="text" placeholder="username" required />
        <input id="registerPass" type="password" placeholder="password" required />
        <button type="submit">Create account</button>
      </form>
    </section>

    <section class="panel">
      <h2>Login</h2>
      <form id="loginForm">
        <input id="loginUser" type="text" placeholder="username" required />
        <input id="loginPass" type="password" placeholder="password" required />
        <button type="submit">Login</button>
      </form>
    </section>

    <section class="panel">
      <h2>Status</h2>
      <pre id="status">Ready</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
