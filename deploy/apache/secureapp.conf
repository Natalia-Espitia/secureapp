<VirtualHost *:80>
    ServerName arepecilab.duckdns.org
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName arepecilab.duckdns.org
        DocumentRoot /var/www/secureapp

        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/arepecilab.duckdns.org/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/arepecilab.duckdns.org/privkey.pem

        SSLProxyEngine on
        SSLProxyCheckPeerName off
        SSLProxyCheckPeerCN off
        ProxyPreserveHost On
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Port "443"

        ProxyPass /api https://127.0.0.1:5000/api retry=0
        ProxyPassReverse /api https://127.0.0.1:5000/api

        <Directory /var/www/secureapp>
            Options Indexes FollowSymLinks
            AllowOverride None
            Require all granted
        </Directory>

        ErrorLog /var/log/httpd/secureapp-error.log
        CustomLog /var/log/httpd/secureapp-access.log combined
    </VirtualHost>
</IfModule>
