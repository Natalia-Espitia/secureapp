spring.application.name=secureapp
server.port=${PORT:5000}
server.address=${SERVER_ADDRESS:0.0.0.0}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/secureappdb;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

app.security.allowed-origins=${APP_ALLOWED_ORIGINS:https://arepecilab.duckdns.org}
app.security.session-ttl=${APP_SESSION_TTL:30m}

server.ssl.enabled=${SERVER_SSL_ENABLED:true}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:classpath:ecikeystore.p12}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:123456.}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:ecikeypair}
